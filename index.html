<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>拼豆图片转换器 · 全色号 · 精细版</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh;
      user-select: none; -webkit-user-select: none;
      touch-action: none;
    }
    .app {
      width: 100%; max-width: 500px;
      display: flex; flex-direction: column; height: 100vh;
      background: #fff; box-shadow: 0 0 30px rgba(0,0,0,0.15);
    }
    .header {
      padding: 12px 16px; background: #fff; border-bottom: 1px solid #eee;
      text-align: center; font-weight: 600; font-size: 18px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header button {
      background: none; border: none; font-size: 16px; cursor: pointer; padding: 6px 10px; color: #555;
    }

    .canvas-wrapper {
      flex: 1; overflow: hidden; position: relative; background: #e8e8e8;
      touch-action: none;
    }
    .canvas-inner {
      position: absolute; top: 50%; left: 50%; transform-origin: 0 0;
    }
    canvas {
      display: block;
      image-rendering: pixelated; image-rendering: crisp-edges;
      background: #fff;
    }

    .controls {
      padding: 8px 16px; background: #fafafa; border-top: 1px solid #eee;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .controls label { font-size: 14px; }
    .controls input[type="range"] { flex: 1; }
    .controls button {
      background: #333; color: #fff; border: none; border-radius: 8px;
      padding: 8px 14px; font-size: 14px; cursor: pointer;
    }
    .toggle-btn {
      background: #eee; color: #333; border: 1px solid #ccc;
      padding: 6px 12px; border-radius: 8px; font-size: 14px; cursor: pointer;
    }
    .toggle-btn.active { background: #ffe0cc; border-color: #ff8c42; }

    .current-color-bar {
      display: flex; align-items: center; padding: 8px 16px;
      background: #fafafa; border-top: 1px solid #eee;
    }
    .current-swatch {
      width: 36px; height: 36px; border-radius: 8px;
      border: 2px solid #333; margin-right: 12px;
    }
    .color-label { font-size: 14px; color: #333; font-weight: 500; }

    .palette {
      display: flex; overflow-x: auto; padding: 8px 12px; gap: 8px;
      background: #fff; border-top: 1px solid #eee;
      -webkit-overflow-scrolling: touch;
    }
    .color-btn {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid #ddd; cursor: pointer; transition: 0.1s;
    }
    .color-btn.active { border-color: #333; box-shadow: 0 0 0 3px rgba(0,0,0,0.2); transform: scale(1.1); }
    .color-btn.eraser {
      background: repeating-linear-gradient(45deg, #ccc 0, #ccc 4px, #fff 4px, #fff 8px);
      border-style: dashed;
    }

    .toolbar {
      display: flex; justify-content: space-around; padding: 10px 8px;
      background: #fff; border-top: 1px solid #eee; gap: 4px; flex-wrap: wrap;
    }
    .tool-btn {
      background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px;
      padding: 8px 10px; font-size: 14px; cursor: pointer; white-space: nowrap;
      display: flex; align-items: center; gap: 4px;
    }
    .tool-btn:active { background: #e0e0e0; }
    .tool-btn.active-tool { background: #ffe0cc; border-color: #ff8c42; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <span>📷 精细拼豆图纸</span>
    <div>
      <button id="fitBtn">🔍 适应屏幕</button>
      <button id="exportBtn">💾 导出</button>
    </div>
  </div>

  <div class="canvas-wrapper" id="canvasWrapper">
    <div class="canvas-inner" id="canvasInner">
      <canvas id="mainCanvas"></canvas>
    </div>
  </div>

  <div class="controls">
    <label>宽度(豆子): <span id="widthValue">80</span></label>
    <input type="range" id="widthSlider" min="10" max="200" value="80" step="1">
    <button id="uploadBtn">📁 选图片</button>
    <button id="ditherBtn" class="toggle-btn active">✨ 抖动:开</button>
    <button id="codeToggleBtn" class="toggle-btn active">🔢 色号:开</button>
    <button id="resetBtn" class="tool-btn">🔄 空白板</button>
  </div>

  <div class="current-color-bar">
    <div class="current-swatch" id="currentSwatch" style="background: #FFFFFF;"></div>
    <span class="color-label" id="colorLabel">H01 白色</span>
  </div>

  <div class="palette" id="palette"></div>

  <div class="toolbar">
    <button class="tool-btn" id="undoBtn">↩️ 撤销</button>
    <button class="tool-btn" id="redoBtn">↪️ 重做</button>
    <button class="tool-btn active-tool" id="drawModeBtn">✏️ 绘画</button>
    <button class="tool-btn" id="eraserBtn">🧹 橡皮</button>
    <button class="tool-btn" id="fillBtn">🪣 填充</button>
    <button class="tool-btn" id="symmetryBtn">🪞 对称:关</button>
    <button class="tool-btn" id="clearBtn">🗑️ 清空</button>
  </div>
</div>

<script>
  (function() {
    // ========== Hama 全色板 (60色，含色号) ==========
    const PALETTE = [
      { code: "H01", name: "白色", hex: "#FFFFFF" },
      { code: "H02", name: "奶油色", hex: "#FFFDD0" },
      { code: "H03", name: "象牙白", hex: "#FFFFF0" },
      { code: "H04", name: "浅灰", hex: "#D3D3D3" },
      { code: "H05", name: "灰色", hex: "#808080" },
      { code: "H06", name: "深灰", hex: "#505050" },
      { code: "H07", name: "黑色", hex: "#000000" },
      { code: "H08", name: "深棕", hex: "#3E2723" },
      { code: "H09", name: "棕色", hex: "#795548" },
      { code: "H10", name: "浅棕", hex: "#A1887F" },
      { code: "H11", name: "肤色", hex: "#FFCCBC" },
      { code: "H12", name: "深肤色", hex: "#D7A68E" },
      { code: "H13", name: "红色", hex: "#F44336" },
      { code: "H14", name: "深红", hex: "#B71C1C" },
      { code: "H15", name: "粉色", hex: "#F8BBD0" },
      { code: "H16", name: "亮粉", hex: "#FF4081" },
      { code: "H17", name: "橙色", hex: "#FF9800" },
      { code: "H18", name: "深橙", hex: "#E65100" },
      { code: "H19", name: "黄色", hex: "#FFEB3B" },
      { code: "H20", name: "金黄", hex: "#FFC107" },
      { code: "H21", name: "浅绿", hex: "#8BC34A" },
      { code: "H22", name: "绿色", hex: "#4CAF50" },
      { code: "H23", name: "深绿", hex: "#2E7D32" },
      { code: "H24", name: "薄荷绿", hex: "#B2DFDB" },
      { code: "H25", name: "浅蓝", hex: "#64B5F6" },
      { code: "H26", name: "蓝色", hex: "#2196F3" },
      { code: "H27", name: "深蓝", hex: "#0D47A1" },
      { code: "H28", name: "天蓝", hex: "#81D4FA" },
      { code: "H29", name: "紫色", hex: "#9C27B0" },
      { code: "H30", name: "深紫", hex: "#4A148C" },
      { code: "H31", name: "薰衣草", hex: "#CE93D8" },
      { code: "H32", name: "品红", hex: "#E91E63" },
      { code: "H33", name: "军绿", hex: "#556B2F" },
      { code: "H34", name: "橄榄绿", hex: "#6B8E23" },
      { code: "H35", name: "茶色", hex: "#CD853F" },
      { code: "H36", name: "杏色", hex: "#FFDAB9" },
      { code: "H37", name: "珊瑚色", hex: "#FF7F50" },
      { code: "H38", name: "蜜瓜色", hex: "#FDBCB4" },
      { code: "H39", name: "淡紫", hex: "#E1BEE7" },
      { code: "H40", name: "灰蓝", hex: "#607D8B" },
      { code: "H41", name: "牛仔蓝", hex: "#1565C0" },
      { code: "H42", name: "森林绿", hex: "#1B5E20" },
      { code: "H43", name: "柠檬绿", hex: "#C0CA33" },
      { code: "H44", name: "芥末黄", hex: "#D4E157" },
      { code: "H45", name: "桃色", hex: "#FFE0B2" },
      { code: "H46", name: "玫瑰红", hex: "#C2185B" },
      { code: "H47", name: "酒红", hex: "#880E4F" },
      { code: "H48", name: "浅粉", hex: "#FFB6C1" },
      { code: "H49", name: "浅杏", hex: "#FFDAB9" },
      { code: "H50", name: "沙色", hex: "#C2B280" },
      { code: "H51", name: "卡其", hex: "#C3B091" },
      { code: "H52", name: "古铜", hex: "#CD7F32" },
      { code: "H53", name: "金色", hex: "#FFD700" },
      { code: "H54", name: "银色", hex: "#C0C0C0" },
      { code: "H55", name: "铜色", hex: "#B87333" },
      { code: "H56", name: "紫红", hex: "#C71585" },
      { code: "H57", name: "蓝紫", hex: "#6A5ACD" },
      { code: "H58", name: "青绿", hex: "#00BCD4" },
      { code: "H59", name: "亮绿", hex: "#76FF03" },
      { code: "H60", name: "亮黄", hex: "#FFEA00" }
    ];

    // ========== 状态 ==========
    const CELL_SIZE = 12;
    const MAX_HISTORY = 50;
    const GRID_COLOR = '#ccc';

    let grid = [], gridWidth = 80, gridHeight = 60;
    let currentColor = PALETTE[0].hex;
    let currentColorCode = PALETTE[0].code;
    let currentColorName = PALETTE[0].name;
    let eraserMode = false, symmetryMode = false, currentTool = 'draw';
    let useDither = true;
    let showCodes = true;    // 色号开关

    let scale = 1, translateX = 0, translateY = 0;
    let history = [], historyIndex = -1;

    // DOM
    const canvasWrapper = document.getElementById('canvasWrapper');
    const canvasInner = document.getElementById('canvasInner');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const widthSlider = document.getElementById('widthSlider');
    const widthValue = document.getElementById('widthValue');
    const uploadBtn = document.getElementById('uploadBtn');
    const ditherBtn = document.getElementById('ditherBtn');
    const codeToggleBtn = document.getElementById('codeToggleBtn');
    const resetBtn = document.getElementById('resetBtn');
    const paletteDiv = document.getElementById('palette');
    const exportBtn = document.getElementById('exportBtn');
    const fitBtn = document.getElementById('fitBtn');
    const currentSwatch = document.getElementById('currentSwatch');
    const colorLabel = document.getElementById('colorLabel');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');
    const drawModeBtn = document.getElementById('drawModeBtn');
    const eraserBtn = document.getElementById('eraserBtn');
    const fillBtn = document.getElementById('fillBtn');
    const symmetryBtn = document.getElementById('symmetryBtn');
    const clearBtn = document.getElementById('clearBtn');

    // 根据颜色返回其色号
    function getColorCode(hex) {
      const color = PALETTE.find(c => c.hex.toUpperCase() === hex.toUpperCase());
      return color ? color.code : '';
    }

    // 网格工具
    function initGrid(w,h,fill=null){ grid = Array(h).fill().map(()=>Array(w).fill(fill)); }
    function pushHistory(){
      if(historyIndex<history.length-1) history=history.slice(0,historyIndex+1);
      history.push({grid:grid.map(r=>[...r]),w:gridWidth,h:gridHeight});
      if(history.length>MAX_HISTORY){history.shift();}else{historyIndex++;}
    }
    function undo(){ if(historyIndex>0){ historyIndex--; loadHistory(history[historyIndex]); } }
    function redo(){ if(historyIndex<history.length-1){ historyIndex++; loadHistory(history[historyIndex]); } }
    function loadHistory(e){ grid=e.grid.map(r=>[...r]); gridWidth=e.w; gridHeight=e.h; updateCanvasSize(); render(); }
    function updateCanvasSize(){
      canvas.width=gridWidth*CELL_SIZE; canvas.height=gridHeight*CELL_SIZE;
      canvas.style.width=canvas.width+'px'; canvas.style.height=canvas.height+'px';
      fitToScreen();
    }

    function fitToScreen() {
      const wrapperRect = canvasWrapper.getBoundingClientRect();
      const maxWidth = wrapperRect.width * 0.9;
      const maxHeight = wrapperRect.height * 0.9;
      const scaleX = maxWidth / canvas.width;
      const scaleY = maxHeight / canvas.height;
      scale = Math.min(scaleX, scaleY, 2);
      translateX = (wrapperRect.width - canvas.width * scale) / 2;
      translateY = (wrapperRect.height - canvas.height * scale) / 2;
      applyTransform();
    }

    function applyTransform(){ canvasInner.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; }

    // 绘制网格，包括色号（根据当前缩放比决定是否显示）
    function render(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      // 绘制格子颜色
      for(let r=0;r<gridHeight;r++) for(let c=0;c<gridWidth;c++){
        ctx.fillStyle=grid[r][c]||'#FFFFFF';
        ctx.fillRect(c*CELL_SIZE,r*CELL_SIZE,CELL_SIZE,CELL_SIZE);
      }
      // 网格线
      ctx.strokeStyle=GRID_COLOR; ctx.lineWidth=0.5; ctx.beginPath();
      for(let i=0;i<=gridWidth;i++){ ctx.moveTo(i*CELL_SIZE,0); ctx.lineTo(i*CELL_SIZE,canvas.height); }
      for(let j=0;j<=gridHeight;j++){ ctx.moveTo(0,j*CELL_SIZE); ctx.lineTo(canvas.width,j*CELL_SIZE); }
      ctx.stroke();

      // 绘制色号（只在开启且实际像素>=14时绘制，避免密麻）
      if (showCodes && scale * CELL_SIZE >= 14) {
        ctx.font = `${Math.max(8, scale * CELL_SIZE * 0.55)}px -apple-system, BlinkMacSystemFont, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (let r = 0; r < gridHeight; r++) {
          for (let c = 0; c < gridWidth; c++) {
            const hex = grid[r][c] || '#FFFFFF';
            const code = getColorCode(hex);
            if (!code) continue;
            const x = c * CELL_SIZE + CELL_SIZE / 2;
            const y = r * CELL_SIZE + CELL_SIZE / 2;
            // 根据背景亮度选择文字颜色
            const rgb = hexToRgb(hex);
            const brightness = (rgb[0]*299 + rgb[1]*587 + rgb[2]*114) / 1000;
            ctx.fillStyle = brightness > 150 ? '#000000' : '#FFFFFF';
            ctx.fillText(code, x, y);
          }
        }
      }
    }

    // 颜色转换
    function hexToRgb(h){ const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return [r,g,b]; }
    function dist(a,b){ return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2); }
    function closestColor(rgb){
      let min=Infinity, best=PALETTE[0].hex;
      for(const c of PALETTE){ const d=dist(rgb, hexToRgb(c.hex)); if(d<min){ min=d; best=c.hex; } }
      return best;
    }

    // Floyd-Steinberg 抖动
    function ditherImageData(imageData, w, h){
      const pixels = imageData.data;
      const errors = new Float32Array(w*h*3);
      const result = new Array(h).fill().map(()=>new Array(w).fill(null));
      for(let y=0; y<h; y++){
        for(let x=0; x<w; x++){
          const idx = (y*w + x)*4;
          if(pixels[idx+3]<128){ result[y][x]='#FFFFFF'; continue; }
          const errIdx = (y*w + x)*3;
          let r = Math.min(255, Math.max(0, pixels[idx] + errors[errIdx]));
          let g = Math.min(255, Math.max(0, pixels[idx+1] + errors[errIdx+1]));
          let b = Math.min(255, Math.max(0, pixels[idx+2] + errors[errIdx+2]));
          const chosenHex = closestColor([r,g,b]);
          const chosenRGB = hexToRgb(chosenHex);
          result[y][x] = chosenHex;
          const errR = r - chosenRGB[0], errG = g - chosenRGB[1], errB = b - chosenRGB[2];
          const distribute = (dx, dy, wR, wG, wB) => {
            const nx = x+dx, ny = y+dy;
            if(nx>=0 && nx<w && ny>=0 && ny<h){
              const nIdx = (ny*w + nx)*3;
              errors[nIdx] += wR; errors[nIdx+1] += wG; errors[nIdx+2] += wB;
            }
          };
          distribute(1,0, errR*7/16, errG*7/16, errB*7/16);
          distribute(-1,1, errR*3/16, errG*3/16, errB*3/16);
          distribute(0,1, errR*5/16, errG*5/16, errB*5/16);
          distribute(1,1, errR*1/16, errG*1/16, errB*1/16);
        }
      }
      return result;
    }

    function directMap(imageData, w, h){
      const result = new Array(h).fill().map(()=>new Array(w).fill(null));
      const pixels = imageData.data;
      for(let y=0; y<h; y++){
        for(let x=0; x<w; x++){
          const idx = (y*w + x)*4;
          if(pixels[idx+3]<128){ result[y][x]='#FFFFFF'; continue; }
          const hex = '#' + [pixels[idx],pixels[idx+1],pixels[idx+2]].map(c=>c.toString(16).padStart(2,'0')).join('');
          result[y][x] = closestColor(hexToRgb(hex));
        }
      }
      return result;
    }

    function imageToGrid(img, targetWidth){
      const aspect = img.height/img.width;
      const targetHeight = Math.max(1, Math.round(targetWidth*aspect));
      const offCanvas = document.createElement('canvas');
      offCanvas.width = targetWidth; offCanvas.height = targetHeight;
      const offCtx = offCanvas.getContext('2d');
      offCtx.drawImage(img, 0,0, targetWidth, targetHeight);
      const imageData = offCtx.getImageData(0,0,targetWidth,targetHeight);
      let newGrid;
      if(useDither) newGrid = ditherImageData(imageData, targetWidth, targetHeight);
      else newGrid = directMap(imageData, targetWidth, targetHeight);
      return { grid:newGrid, w:targetWidth, h:targetHeight };
    }

    function loadAndConvert(file){
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const w = parseInt(widthSlider.value,10);
          const result = imageToGrid(img, w);
          grid = result.grid; gridWidth = result.w; gridHeight = result.h;
          updateCanvasSize(); render();
          history = [{grid:grid.map(r=>[...r]), w:gridWidth, h:gridHeight}]; historyIndex=0;
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    uploadBtn.addEventListener('click',()=>{
      const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
      inp.onchange=e=>{ if(e.target.files[0]) loadAndConvert(e.target.files[0]); };
      inp.click();
    });
    widthSlider.addEventListener('input',e=>{ widthValue.textContent=e.target.value; });
    ditherBtn.addEventListener('click',()=>{
      useDither = !useDither;
      ditherBtn.textContent = `✨ 抖动:${useDither?'开':'关'}`;
      ditherBtn.classList.toggle('active', useDither);
      alert('抖动设置已更改，请重新上传图片以应用效果。');
    });
    codeToggleBtn.addEventListener('click',()=>{
      showCodes = !showCodes;
      codeToggleBtn.textContent = `🔢 色号:${showCodes?'开':'关'}`;
      codeToggleBtn.classList.toggle('active', showCodes);
      render();
    });
    resetBtn.addEventListener('click',()=>{
      const w=parseInt(widthSlider.value,10), h=Math.round(w*0.75);
      pushHistory(); initGrid(w,h,null); gridWidth=w; gridHeight=h;
      updateCanvasSize(); render();
      history=[{grid:grid.map(r=>[...r]),w,h}]; historyIndex=0;
    });

    fitBtn.addEventListener('click', fitToScreen);

    // 绘图交互
    function getCell(e){
      const rect=canvas.getBoundingClientRect();
      let cx,cy;
      if(e.touches){ if(e.touches.length===0)return null; cx=e.touches[0].clientX; cy=e.touches[0].clientY; }
      else { cx=e.clientX; cy=e.clientY; }
      const canvasX=(cx-rect.left)/scale, canvasY=(cy-rect.top)/scale;
      const col=Math.floor(canvasX/CELL_SIZE), row=Math.floor(canvasY/CELL_SIZE);
      if(col>=0&&col<gridWidth&&row>=0&&row<gridHeight) return {row,col};
      return null;
    }
    function fillCell(r,c,color){ if(grid[r][c]===color)return false; grid[r][c]=color; return true; }
    function handleDraw(e){
      const cell=getCell(e); if(!cell)return;
      let changed=false; const color=eraserMode?null:currentColor;
      changed=fillCell(cell.row,cell.col,color)||changed;
      if(symmetryMode&&!eraserMode){
        const symCol=gridWidth-1-cell.col;
        if(symCol>=0&&symCol<gridWidth&&symCol!==cell.col) changed=fillCell(cell.row,symCol,color)||changed;
      }
      if(changed) render();
    }
    function floodFill(row,col,target,replace){
      if(target===replace||grid[row][col]!==target)return false;
      const q=[[row,col]], visited=new Set(); visited.add(`${row},${col}`);
      while(q.length){
        const [r,c]=q.shift(); grid[r][c]=replace;
        [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{
          if(nr>=0&&nr<gridHeight&&nc>=0&&nc<gridWidth&&!visited.has(`${nr},${nc}`)&&grid[nr][nc]===target){
            visited.add(`${nr},${nc}`); q.push([nr,nc]);
          }
        });
      }
      return true;
    }
    function handleFill(e){
      if(eraserMode)return;
      const cell=getCell(e); if(!cell)return;
      const target=grid[cell.row][cell.col]; if(target===currentColor)return;
      pushHistory(); floodFill(cell.row,cell.col,target,currentColor); render();
    }
    function onCanvasStart(e){
      if(e.touches&&e.touches.length===2)return;
      if(currentTool==='fill') handleFill(e);
      else { pushHistory(); handleDraw(e); }
      const move=e=>{ e.preventDefault(); if(currentTool!=='fill') handleDraw(e); };
      const up=()=>{ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); document.removeEventListener('touchmove',move); document.removeEventListener('touchend',up); };
      document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
      document.addEventListener('touchmove',move,{passive:false}); document.addEventListener('touchend',up);
    }
    canvas.addEventListener('mousedown',onCanvasStart);
    canvas.addEventListener('touchstart',e=>{ e.preventDefault(); onCanvasStart(e); });

    function setTool(t){
      currentTool=t; [drawModeBtn,eraserBtn,fillBtn].forEach(b=>b.classList.remove('active-tool'));
      if(t==='draw'){ eraserMode=false; drawModeBtn.classList.add('active-tool'); }
      else if(t==='eraser'){ eraserMode=true; eraserBtn.classList.add('active-tool'); }
      else if(t==='fill'){ eraserMode=false; fillBtn.classList.add('active-tool'); }
    }
    drawModeBtn.addEventListener('click',()=>setTool('draw'));
    eraserBtn.addEventListener('click',()=>setTool('eraser'));
    fillBtn.addEventListener('click',()=>setTool('fill'));
    symmetryBtn.addEventListener('click',()=>{ symmetryMode=!symmetryMode; symmetryBtn.textContent=`🪞 对称:${symmetryMode?'开':'关'}`; });
    clearBtn.addEventListener('click',()=>{ if(confirm('清空画布？')){ pushHistory(); initGrid(gridWidth,gridHeight,null); render(); } });
    undoBtn.addEventListener('click',undo); redoBtn.addEventListener('click',redo);

    // 调色盘
    function buildPalette(){
      paletteDiv.innerHTML='';
      const eraser=document.createElement('div'); eraser.className='color-btn eraser'; eraser.title='橡皮擦';
      eraser.addEventListener('click',()=>{
        setTool('eraser');
        document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
        eraser.classList.add('active');
        currentSwatch.style.background = 'transparent';
        colorLabel.textContent = '橡皮擦';
      });
      paletteDiv.appendChild(eraser);

      PALETTE.forEach((c,i)=>{
        const btn=document.createElement('div');
        btn.className='color-btn';
        btn.style.background=c.hex;
        btn.title = `${c.code} ${c.name}`;
        btn.addEventListener('click',()=>{
          setTool('draw');
          currentColor = c.hex;
          currentColorCode = c.code;
          currentColorName = c.name;
          currentSwatch.style.background = c.hex;
          colorLabel.textContent = `${c.code} ${c.name}`;
          document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          eraser.classList.remove('active');
        });
        paletteDiv.appendChild(btn);
        if(i===0) {
          btn.classList.add('active');
          currentSwatch.style.background = c.hex;
          colorLabel.textContent = `${c.code} ${c.name}`;
        }
      });
    }

    // 缩放平移
    canvasWrapper.addEventListener('wheel',e=>{
      e.preventDefault();
      const delta=e.deltaY>0?0.9:1.1, newScale=Math.min(5,Math.max(0.2,scale*delta));
      const rect=canvasWrapper.getBoundingClientRect(), mx=e.clientX-rect.left, my=e.clientY-rect.top;
      const ratio=newScale/scale; translateX=mx-ratio*(mx-translateX); translateY=my-ratio*(my-translateY);
      scale=newScale; applyTransform();
      render(); // 重新渲染以根据缩放显示/隐藏色号
    },{passive:false});
    let isPanning=false, lastPanX,lastPanY,lastPinchDist;
    canvasWrapper.addEventListener('touchstart',e=>{
      if(e.touches.length===2){ isPanning=false; lastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }
      else if(e.touches.length===1){ isPanning=true; lastPanX=e.touches[0].clientX; lastPanY=e.touches[0].clientY; }
    });
    canvasWrapper.addEventListener('touchmove',e=>{
      e.preventDefault();
      if(e.touches.length===2){
        const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
        const newScale=Math.min(5,Math.max(0.2,scale*(dist/lastPinchDist)));
        const cx=(e.touches[0].clientX+e.touches[1].clientX)/2, cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
        const rect=canvasWrapper.getBoundingClientRect(); const mx=cx-rect.left, my=cy-rect.top;
        const ratio=newScale/scale; translateX=mx-ratio*(mx-translateX); translateY=my-ratio*(my-translateY);
        scale=newScale; lastPinchDist=dist; applyTransform();
        render();
      } else if(e.touches.length===1&&isPanning){
        const dx=e.touches[0].clientX-lastPanX, dy=e.touches[0].clientY-lastPanY;
        translateX+=dx; translateY+=dy; lastPanX=e.touches[0].clientX; lastPanY=e.touches[0].clientY; applyTransform();
      }
    },{passive:false});
    canvasWrapper.addEventListener('touchend',()=>isPanning=false);
    canvasWrapper.addEventListener('contextmenu',e=>e.preventDefault());

    // 导出（支持色号标注，2倍分辨率）
    exportBtn.addEventListener('click',()=>{
      const exportScale = showCodes ? 2 : 1;
      const expCell = CELL_SIZE * exportScale;
      const expCanvas = document.createElement('canvas');
      expCanvas.width = gridWidth * expCell;
      expCanvas.height = gridHeight * expCell;
      const ectx = expCanvas.getContext('2d');
      // 绘制颜色格子
      for(let r=0;r<gridHeight;r++) for(let c=0;c<gridWidth;c++){
        ectx.fillStyle = grid[r][c] || '#FFFFFF';
        ectx.fillRect(c*expCell, r*expCell, expCell, expCell);
      }
      // 网格线
      ectx.strokeStyle = GRID_COLOR;
      ectx.lineWidth = 0.5 * exportScale;
      ectx.beginPath();
      for(let i=0;i<=gridWidth;i++){ ectx.moveTo(i*expCell,0); ectx.lineTo(i*expCell,expCanvas.height); }
      for(let j=0;j<=gridHeight;j++){ ectx.moveTo(0,j*expCell); ectx.lineTo(expCanvas.width,j*expCell); }
      ectx.stroke();
      // 色号
      if (showCodes) {
        ectx.font = `bold ${expCell*0.5}px -apple-system, BlinkMacSystemFont, sans-serif`;
        ectx.textAlign = 'center';
        ectx.textBaseline = 'middle';
        for (let r = 0; r < gridHeight; r++) {
          for (let c = 0; c < gridWidth; c++) {
            const hex = grid[r][c] || '#FFFFFF';
            const code = getColorCode(hex);
            if (!code) continue;
            const x = c * expCell + expCell/2;
            const y = r * expCell + expCell/2;
            const rgb = hexToRgb(hex);
            const brightness = (rgb[0]*299 + rgb[1]*587 + rgb[2]*114) / 1000;
            ectx.fillStyle = brightness > 150 ? '#000000' : '#FFFFFF';
            ectx.fillText(code, x, y);
          }
        }
      }
      expCanvas.toBlob(b=>{ const url=URL.createObjectURL(b); const a=document.createElement('a'); a.href=url; a.download='精细拼豆图纸.png'; a.click(); URL.revokeObjectURL(url); });
    });

    // 启动
    function initApp(){
      const w=80, h=Math.round(80*0.75);
      initGrid(w,h,null); gridWidth=w; gridHeight=h;
      updateCanvasSize(); buildPalette(); setTool('draw');
      history=[{grid:grid.map(r=>[...r]),w,h}]; historyIndex=0;
      render();
      fitToScreen();
    }
    initApp();
  })();
</script>
</body>
