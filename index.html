<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>拼豆图片转换器 · Artkal全色版</title>
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh;
      user-select: none; -webkit-user-select: none;
      touch-action: none;
    }
    .app {
      width: 100%; max-width: 500px;
      display: flex; flex-direction: column; height: 100vh;
      background: #fff; box-shadow: 0 0 30px rgba(0,0,0,0.15);
    }
    .header {
      padding: 10px 14px; background: #fff; border-bottom: 1px solid #eee;
      text-align: center; font-weight: 600; font-size: 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header button {
      background: none; border: none; font-size: 16px; cursor: pointer; padding: 6px 10px; color: #555;
    }

    .canvas-wrapper {
      flex: 1; overflow: hidden; background: #e8e8e8;
      display: flex; align-items: center; justify-content: center;
      touch-action: none;
      position: relative;
    }
    .canvas-inner {
      transform-origin: center center;
      will-change: transform;
    }
    canvas {
      display: block;
      image-rendering: pixelated; image-rendering: crisp-edges;
      background: #fff;
    }

    .controls {
      padding: 6px 12px; background: #fafafa; border-top: 1px solid #eee;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .controls label { font-size: 13px; }
    .controls input[type="range"] { flex: 1; min-width: 80px; }
    .controls button {
      background: #333; color: #fff; border: none; border-radius: 6px;
      padding: 6px 12px; font-size: 13px; cursor: pointer;
    }
    .toggle-btn {
      background: #eee; color: #333; border: 1px solid #ccc;
      padding: 5px 10px; border-radius: 6px; font-size: 13px; cursor: pointer;
    }
    .toggle-btn.active { background: #ffe0cc; border-color: #ff8c42; }

    .palette {
      display: flex; overflow-x: auto; padding: 6px 10px; gap: 6px;
      background: #fff; border-top: 1px solid #eee;
      -webkit-overflow-scrolling: touch;
    }
    .color-btn {
      flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%;
      border: 2px solid #ddd; cursor: pointer; transition: 0.1s;
      position: relative; display: flex; align-items: center; justify-content: center;
    }
    .color-btn.active { border-color: #333; box-shadow: 0 0 0 3px rgba(0,0,0,0.2); transform: scale(1.1); }
    .color-btn.eraser {
      background: repeating-linear-gradient(45deg, #ccc 0, #ccc 4px, #fff 4px, #fff 8px);
      border-style: dashed;
    }
    .color-number {
      position: absolute; bottom: 2px; right: 2px;
      font-size: 10px; font-weight: bold; color: white; text-shadow: 0 0 2px black;
      pointer-events: none;
    }
    .color-btn.light-bg .color-number { color: #333; text-shadow: none; }

    .toolbar {
      display: flex; justify-content: space-around; padding: 8px 6px;
      background: #fff; border-top: 1px solid #eee; gap: 2px; flex-wrap: wrap;
    }
    .tool-btn {
      background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px;
      padding: 6px 8px; font-size: 12px; cursor: pointer; white-space: nowrap;
      display: flex; align-items: center; gap: 2px;
    }
    .tool-btn:active { background: #e0e0e0; }
    .tool-btn.active-tool { background: #ffe0cc; border-color: #ff8c42; }

    .stats-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }
    .stats-panel {
      background: #fff; border-radius: 12px; padding: 16px;
      width: 90%; max-width: 350px; max-height: 80vh; overflow-y: auto;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
    .stats-panel h3 { margin-bottom: 12px; font-size: 16px; }
    .stats-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .stats-table th, .stats-table td { padding: 6px 8px; border-bottom: 1px solid #eee; text-align: left; }
    .stats-table th { background: #f5f5f5; }
    .color-swatch-small { display: inline-block; width: 16px; height: 16px; border-radius: 4px; margin-right: 6px; vertical-align: middle; }
    .close-btn { background: #333; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; margin-top: 12px; width: 100%; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <span>🎨 Artkal全色拼豆</span>
    <div>
      <button id="fitBtn">🔍 适应</button>
      <button id="exportBtn">💾 导出</button>
    </div>
  </div>

  <div class="canvas-wrapper" id="canvasWrapper">
    <div class="canvas-inner" id="canvasInner">
      <canvas id="mainCanvas"></canvas>
    </div>
  </div>

  <div class="controls">
    <label>宽(豆): <span id="widthValue">80</span></label>
    <input type="range" id="widthSlider" min="10" max="200" value="80" step="1">
    <button id="uploadBtn">📁 图片</button>
    <button id="ditherBtn" class="toggle-btn active">✨ 抖动</button>
    <button id="resetBtn" class="tool-btn">🔄 空白</button>
  </div>

  <div class="palette" id="palette"></div>

  <div class="toolbar">
    <button class="tool-btn" id="undoBtn">↩️</button>
    <button class="tool-btn" id="redoBtn">↪️</button>
    <button class="tool-btn active-tool" id="drawModeBtn">✏️</button>
    <button class="tool-btn" id="eraserBtn">🧹</button>
    <button class="tool-btn" id="fillBtn">🪣</button>
    <button class="tool-btn" id="symmetryBtn">🪞 对称</button>
    <button class="tool-btn" id="numberBtn">🔢 色号</button>
    <button class="tool-btn" id="statsBtn">📊 统计</button>
    <button class="tool-btn" id="clearBtn">🗑️</button>
  </div>
</div>

      { name: "天蓝 (S73)", hex: "#87CEEB" },
      { name: "浅蓝 (S74)", hex: "#64B5F6" },

      { name: "荧光粉 (S97)", hex: "#FF1493" },

      { name: "金属银 (S104)", hex: "#BCC6CC" },
      { name: "金属金 (S105)", hex: "#D4AF37" },

      { name: "透明 (S107)", hex: "#F0F8FF" }, // 透明模拟

      { name: "条纹黑 (S109)", hex: "#2F2F2F" },
      { name: "彩虹 (S110)", hex: "#FFD700" }, // 暂用金色替代

      // 扩展 C 系列软豆色 (111-150)
      { name: "C01 白", hex: "#FFFFFF" },
      { name: "C02 奶油", hex: "#FFFDD0" },
      { name: "C03 灰", hex: "#808080" },
      { name: "C04 黑", hex: "#000000" },
      { name: "C05 红", hex: "#FF0000" },
      { name: "C06 粉", hex: "#FF69B4" },
      { name: "C07 橙", hex: "#FF9800" },
      { name: "C08 黄", hex: "#FFEB3B" },
      { name: "C09 绿", hex: "#4CAF50" },
      { name: "C10 蓝", hex: "#2196F3" },

      { name: "C20 深红", hex: "#B71C1C" },
      { name: "C21 杏", hex: "#FFDAB9" },
      { name: "C22 灰蓝", hex: "#607D8B" },
      { name: "C23 橄榄", hex: "#6B8E23" },
      { name: "C24 卡其", hex: "#C3A882" },
      { name: "C25 深紫", hex: "#4A148C" },
      { name: "C26 浅绿", hex: "#8BC34A" },
      { name: "C27 浅蓝", hex: "#64B5F6" },
      { name: "C28 浅粉", hex: "#FFB6C1" },
      { name: "C29 珊瑚", hex: "#FF7F50" },
      { name: "C30 深棕", hex: "#5C3A21" },
      { name: "C31 银色", hex: "#C0C0C0" },
      { name: "C32 金色", hex: "#FFD700" },
      { name: "C33 古铜", hex: "#B87333" },
      { name: "C34 荧光黄", hex: "#CCFF00" },
      { name: "C35 荧光绿", hex: "#39FF14" },
      { name: "C36 荧光粉", hex: "#FF1493" },
      { name: "C37 荧光橙", hex: "#FF5E00" },
      { name: "C38 荧光蓝", hex: "#00FFFF" },
      { name: "C39 夜光", hex: "#DAF7A6" },
      { name: "C40 透明", hex: "#F0F8FF" }
    ];

    const PALETTE_MAP = {};
    PALETTE.forEach((c, i) => { PALETTE_MAP[c.hex] = i + 1; });

    // ========== 状态 ==========
    const CELL_SIZE = 16;
    const MAX_HISTORY = 50;
    const GRID_COLOR = '#ccc';

    let grid = [], gridWidth = 80, gridHeight = 60;
    let currentColor = PALETTE[0].hex;
    let eraserMode = false, symmetryMode = false, currentTool = 'draw';
    let useDither = true;
    let showNumbers = false;

    let tx = 0, ty = 0, s = 1;
    let history = [], historyIndex = -1;

    // DOM
    const canvasWrapper = document.getElementById('canvasWrapper');
    const canvasInner = document.getElementById('canvasInner');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const widthSlider = document.getElementById('widthSlider');
    const widthValue = document.getElementById('widthValue');
    const uploadBtn = document.getElementById('uploadBtn');
    const ditherBtn = document.getElementById('ditherBtn');
    const resetBtn = document.getElementById('resetBtn');
    const paletteDiv = document.getElementById('palette');
    const exportBtn = document.getElementById('exportBtn');
    const fitBtn = document.getElementById('fitBtn');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');
    const drawModeBtn = document.getElementById('drawModeBtn');
    const eraserBtn = document.getElementById('eraserBtn');
    const fillBtn = document.getElementById('fillBtn');
    const symmetryBtn = document.getElementById('symmetryBtn');
    const numberBtn = document.getElementById('numberBtn');
    const statsBtn = document.getElementById('statsBtn');
    const clearBtn = document.getElementById('clearBtn');

    function initGrid(w,h,fill=null){ grid = Array(h).fill().map(()=>Array(w).fill(fill)); }
    function pushHistory(){
      if(historyIndex<history.length-1) history=history.slice(0,historyIndex+1);
      history.push({grid:grid.map(r=>[...r]),w:gridWidth,h:gridHeight});
      if(history.length>MAX_HISTORY){history.shift();}else{historyIndex++;}
    }
    function undo(){ if(historyIndex>0){ historyIndex--; loadHistory(history[historyIndex]); } }
    function redo(){ if(historyIndex<history.length-1){ historyIndex++; loadHistory(history[historyIndex]); } }
    function loadHistory(e){ grid=e.grid.map(r=>[...r]); gridWidth=e.w; gridHeight=e.h; updateCanvasSize(); render(); }
    function updateCanvasSize(){
      canvas.width = gridWidth * CELL_SIZE;
      canvas.height = gridHeight * CELL_SIZE;
      canvas.style.width = canvas.width + 'px';
      canvas.style.height = canvas.height + 'px';
      fitToScreen();
    }
    function applyTransform(){
      canvasInner.style.transform = `translate(${tx}px, ${ty}px) scale(${s})`;
    }
    function fitToScreen() {
      const wrapperRect = canvasWrapper.getBoundingClientRect();
      const maxW = wrapperRect.width * 0.9;
      const maxH = wrapperRect.height * 0.9;
      s = Math.min(maxW / canvas.width, maxH / canvas.height, 2);
      tx = 0; ty = 0;
      applyTransform();
    }

    function isLightColor(hex){
      const [r,g,b] = hexToRgb(hex);
      return (r*299 + g*587 + b*114) / 1000 > 128;
    }

    function render(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for(let r=0;r<gridHeight;r++) for(let c=0;c<gridWidth;c++){
        const color = grid[r][c] || '#FFFFFF';
        ctx.fillStyle = color;
        ctx.fillRect(c*CELL_SIZE, r*CELL_SIZE, CELL_SIZE, CELL_SIZE);
      }
      ctx.strokeStyle = GRID_COLOR; ctx.lineWidth = 0.5; ctx.beginPath();
      for(let i=0; i<=gridWidth; i++){ ctx.moveTo(i*CELL_SIZE,0); ctx.lineTo(i*CELL_SIZE,canvas.height); }
      for(let j=0; j<=gridHeight; j++){ ctx.moveTo(0,j*CELL_SIZE); ctx.lineTo(canvas.width,j*CELL_SIZE); }
      ctx.stroke();

      if(showNumbers){
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for(let r=0; r<gridHeight; r++) for(let c=0; c<gridWidth; c++){
          const color = grid[r][c] || '#FFFFFF';
          const num = PALETTE_MAP[color];
          if(num){
            const x = c*CELL_SIZE + CELL_SIZE/2;
            const y = r*CELL_SIZE + CELL_SIZE/2;
            ctx.fillStyle = isLightColor(color) ? '#000' : '#fff';
            ctx.fillText(num, x, y);
          }
        }
      }
    }

    function hexToRgb(h){ const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return [r,g,b]; }
    function dist(a,b){ return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2); }
    function closestColor(rgb){
      let min=Infinity, best=PALETTE[0].hex;
      for(const c of PALETTE){ const d=dist(rgb, hexToRgb(c.hex)); if(d<min){ min=d; best=c.hex; } }
      return best;
    }

    function ditherImageData(imageData, w, h){
      const pixels = imageData.data;
      const errors = new Float32Array(w*h*3);
      const result = new Array(h).fill().map(()=>new Array(w).fill(null));
      for(let y=0; y<h; y++){
        for(let x=0; x<w; x++){
          const idx = (y*w + x)*4;
          if(pixels[idx+3]<128){ result[y][x]='#FFFFFF'; continue; }
          const errIdx = (y*w + x)*3;
          let r = Math.min(255, Math.max(0, pixels[idx] + errors[errIdx]));
          let g = Math.min(255, Math.max(0, pixels[idx+1] + errors[errIdx+1]));
          let b = Math.min(255, Math.max(0, pixels[idx+2] + errors[errIdx+2]));
          const chosenHex = closestColor([r,g,b]);
          const chosenRGB = hexToRgb(chosenHex);
          result[y][x] = chosenHex;
          const errR = r - chosenRGB[0], errG = g - chosenRGB[1], errB = b - chosenRGB[2];
          const distribute = (dx, dy, wR, wG, wB) => {
            const nx = x+dx, ny = y+dy;
            if(nx>=0 && nx<w && ny>=0 && ny<h){
              const nIdx = (ny*w + nx)*3;
              errors[nIdx] += wR; errors[nIdx+1] += wG; errors[nIdx+2] += wB;
            }
          };
          distribute(1,0, errR*7/16, errG*7/16, errB*7/16);
          distribute(-1,1, errR*3/16, errG*3/16, errB*3/16);
          distribute(0,1, errR*5/16, errG*5/16, errB*5/16);
          distribute(1,1, errR*1/16, errG*1/16, errB*1/16);
        }
      }
      return result;
    }

    function directMap(imageData, w, h){
      const result = new Array(h).fill().map(()=>new Array(w).fill(null));
      const pixels = imageData.data;
      for(let y=0; y<h; y++){
        for(let x=0; x<w; x++){
          const idx = (y*w + x)*4;
          if(pixels[idx+3]<128){ result[y][x]='#FFFFFF'; continue; }
          const hex = '#' + [pixels[idx],pixels[idx+1],pixels[idx+2]].map(c=>c.toString(16).padStart(2,'0')).join('');
          result[y][x] = closestColor(hexToRgb(hex));
        }
      }
      return result;
    }

    function imageToGrid(img, targetWidth){
      const aspect = img.height/img.width;
      const targetHeight = Math.max(1, Math.round(targetWidth*aspect));
      const offCanvas = document.createElement('canvas');
      offCanvas.width = targetWidth; offCanvas.height = targetHeight;
      const offCtx = offCanvas.getContext('2d');
      offCtx.drawImage(img, 0,0, targetWidth, targetHeight);
      const imageData = offCtx.getImageData(0,0,targetWidth,targetHeight);
      let newGrid;
      if(useDither) newGrid = ditherImageData(imageData, targetWidth, targetHeight);
      else newGrid = directMap(imageData, targetWidth, targetHeight);
      return { grid:newGrid, w:targetWidth, h:targetHeight };
    }

    function loadAndConvert(file){
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const w = parseInt(widthSlider.value,10);
          const result = imageToGrid(img, w);
          grid = result.grid; gridWidth = result.w; gridHeight = result.h;
          updateCanvasSize(); render();
          history = [{grid:grid.map(r=>[...r]), w:gridWidth, h:gridHeight}]; historyIndex=0;
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    uploadBtn.addEventListener('click',()=>{
      const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
      inp.onchange=e=>{ if(e.target.files[0]) loadAndConvert(e.target.files[0]); };
      inp.click();
    });
    widthSlider.addEventListener('input',e=>{ widthValue.textContent=e.target.value; });
    ditherBtn.addEventListener('click',()=>{
      useDither = !useDither;
      ditherBtn.textContent = `✨ 抖动${useDither?'开':'关'}`;
      ditherBtn.classList.toggle('active', useDither);
      alert('抖动设置已更改，请重新上传图片以应用效果。');
    });
    resetBtn.addEventListener('click',()=>{
      const w=parseInt(widthSlider.value,10), h=Math.round(w*0.75);
      pushHistory(); initGrid(w,h,null); gridWidth=w; gridHeight=h;
      updateCanvasSize(); render();
      history=[{grid:grid.map(r=>[...r]),w,h}]; historyIndex=0;
    });

    fitBtn.addEventListener('click', fitToScreen);

    function getCell(e){
      const canvasRect = canvas.getBoundingClientRect();
      let clientX, clientY;
      if(e.touches){
        if(e.touches.length === 0) return null;
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      const rect = canvas.getBoundingClientRect();
      const offsetX = (clientX - rect.left) / s;
      const offsetY = (clientY - rect.top) / s;
      const col = Math.floor(offsetX / CELL_SIZE);
      const row = Math.floor(offsetY / CELL_SIZE);
      if(col >= 0 && col < gridWidth && row >= 0 && row < gridHeight) return {row, col};
      return null;
    }
    function fillCell(r,c,color){ if(grid[r][c]===color)return false; grid[r][c]=color; return true; }
    function handleDraw(e){
      const cell = getCell(e); if(!cell) return;
      let changed = false; const color = eraserMode ? null : currentColor;
      changed = fillCell(cell.row, cell.col, color) || changed;
      if(symmetryMode && !eraserMode){
        const symCol = gridWidth - 1 - cell.col;
        if(symCol >= 0 && symCol < gridWidth && symCol !== cell.col)
          changed = fillCell(cell.row, symCol, color) || changed;
      }
      if(changed) render();
    }
    function floodFill(row,col,target,replace){
      if(target === replace || grid[row][col] !== target) return false;
      const q = [[row,col]], visited = new Set(); visited.add(`${row},${col}`);
      while(q.length){
        const [r,c] = q.shift(); grid[r][c] = replace;
        [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{
          if(nr>=0 && nr<gridHeight && nc>=0 && nc<gridWidth && !visited.has(`${nr},${nc}`) && grid[nr][nc]===target){
            visited.add(`${nr},${nc}`); q.push([nr,nc]);
          }
        });
      }
      return true;
    }
    function handleFill(e){
      if(eraserMode) return;
      const cell = getCell(e); if(!cell) return;
      const target = grid[cell.row][cell.col]; if(target === currentColor) return;
      pushHistory(); floodFill(cell.row, cell.col, target, currentColor); render();
    }
    function onCanvasStart(e){
      if(e.touches && e.touches.length === 2) return;
      if(currentTool === 'fill') handleFill(e);
      else { pushHistory(); handleDraw(e); }
      const move = e => { e.preventDefault(); if(currentTool !== 'fill') handleDraw(e); };
      const up = () => {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
        document.removeEventListener('touchmove', move);
        document.removeEventListener('touchend', up);
      };
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
      document.addEventListener('touchmove', move, {passive: false});
      document.addEventListener('touchend', up);
    }
    canvas.addEventListener('mousedown', onCanvasStart);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); onCanvasStart(e); });

    function setTool(t){
      currentTool = t;
      [drawModeBtn,eraserBtn,fillBtn].forEach(b=>b.classList.remove('active-tool'));
      if(t==='draw'){ eraserMode=false; drawModeBtn.classList.add('active-tool'); }
      else if(t==='eraser'){ eraserMode=true; eraserBtn.classList.add('active-tool'); }
      else if(t==='fill'){ eraserMode=false; fillBtn.classList.add('active-tool'); }
    }
    drawModeBtn.addEventListener('click',()=>setTool('draw'));
    eraserBtn.addEventListener('click',()=>setTool('eraser'));
    fillBtn.addEventListener('click',()=>setTool('fill'));
    symmetryBtn.addEventListener('click',()=>{ symmetryMode=!symmetryMode; symmetryBtn.textContent=`🪞 对称${symmetryMode?'开':'关'}`; });
    numberBtn.addEventListener('click',()=>{
      showNumbers = !showNumbers;
      numberBtn.classList.toggle('active-tool', showNumbers);
      render();
    });
    clearBtn.addEventListener('click',()=>{ if(confirm('清空画布？')){ pushHistory(); initGrid(gridWidth,gridHeight,null); render(); } });
    undoBtn.addEventListener('click',undo); redoBtn.addEventListener('click',redo);

    // 统计功能
    statsBtn.addEventListener('click', ()=>{
      const stats = {};
      for(let r=0; r<gridHeight; r++) for(let c=0; c<gridWidth; c++){
        const color = grid[r][c];
        if(!color || color === '#FFFFFF') continue;
        stats[color] = (stats[color] || 0) + 1;
      }
      const overlay = document.createElement('div');
      overlay.className = 'stats-overlay';
      const panel = document.createElement('div');
      panel.className = 'stats-panel';
      let html = '<h3>📊 拼豆颜色统计</h3>';
      if(Object.keys(stats).length === 0){
        html += '<p>暂无有效颜色数据（空白或全白）</p>';
      } else {
        html += '<table class="stats-table"><tr><th>色号</th><th>颜色</th><th>名称</th><th>数量</th></tr>';
        const sorted = Object.entries(stats).sort((a,b)=>{
          const idxA = PALETTE_MAP[a[0]] || 999;
          const idxB = PALETTE_MAP[b[0]] || 999;
          return idxA - idxB;
        });
        sorted.forEach(([hex, count]) => {
          const idx = PALETTE_MAP[hex] || '?';
          const name = PALETTE.find(c=>c.hex===hex)?.name || '未知';
          html += `<tr>
            <td>${idx}</td>
            <td><span class="color-swatch-small" style="background:${hex};"></span></td>
            <td>${name}</td>
            <td>${count}</td>
          </tr>`;
        });
        html += '</table>';
      }
      html += '<button class="close-btn" id="closeStats">关闭</button>';
      panel.innerHTML = html;
      overlay.appendChild(panel);
      document.body.appendChild(overlay);
      document.getElementById('closeStats').addEventListener('click', ()=>{
        overlay.remove();
      });
      overlay.addEventListener('click', (e)=>{
        if(e.target === overlay) overlay.remove();
      });
    });

    // 调色盘
    function buildPalette(){
      paletteDiv.innerHTML = '';
      const eraser = document.createElement('div');
      eraser.className = 'color-btn eraser';
      eraser.title = '橡皮';
      eraser.addEventListener('click', ()=>{
        setTool('eraser');
        document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
        eraser.classList.add('active');
      });
      paletteDiv.appendChild(eraser);

      PALETTE.forEach((c, i)=>{
        const btn = document.createElement('div');
        btn.className = 'color-btn';
        btn.style.background = c.hex;
        btn.title = `[${i+1}] ${c.name}`;
        const numSpan = document.createElement('span');
        numSpan.className = 'color-number';
        numSpan.textContent = i+1;
        btn.appendChild(numSpan);
        if(isLightColor(c.hex)) btn.classList.add('light-bg');

        btn.addEventListener('click', ()=>{
          setTool('draw');
          currentColor = c.hex;
          document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          eraser.classList.remove('active');
        });
        paletteDiv.appendChild(btn);
        if(i === 0) btn.classList.add('active');
      });
    }

    // 手势
    let lastPanX = 0, lastPanY = 0, lastPinchDist = 0;
    canvasWrapper.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      const newScale = Math.min(5, Math.max(0.2, s * delta));
      const rect = canvasWrapper.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const scaleChange = newScale / s;
      tx = mx - scaleChange * (mx - tx);
      ty = my - scaleChange * (my - ty);
      s = newScale;
      applyTransform();
    }, {passive: false});

    canvasWrapper.addEventListener('touchstart', e => {
      if(e.touches.length === 2){
        lastPinchDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      } else if(e.touches.length === 1){
        lastPanX = e.touches[0].clientX;
        lastPanY = e.touches[0].clientY;
      }
    });
    canvasWrapper.addEventListener('touchmove', e => {
      e.preventDefault();
      if(e.touches.length === 2){
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const newScale = Math.min(5, Math.max(0.2, s * (dist / lastPinchDist)));
        const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        const rect = canvasWrapper.getBoundingClientRect();
        const mx = cx - rect.left;
        const my = cy - rect.top;
        const scaleChange = newScale / s;
        tx = mx - scaleChange * (mx - tx);
        ty = my - scaleChange * (my - ty);
        s = newScale;
        lastPinchDist = dist;
        applyTransform();
      } else if(e.touches.length === 1){
        const dx = e.touches[0].clientX - lastPanX;
        const dy = e.touches[0].clientY - lastPanY;
        tx += dx;
        ty += dy;
        lastPanX = e.touches[0].clientX;
        lastPanY = e.touches[0].clientY;
        applyTransform();
      }
    }, {passive: false});
    canvasWrapper.addEventListener('touchend', ()=>{});
    canvasWrapper.addEventListener('contextmenu', e => e.preventDefault());

    // 导出
    exportBtn.addEventListener('click',()=>{
      const exp = document.createElement('canvas');
      exp.width = canvas.width; exp.height = canvas.height;
      const ectx = exp.getContext('2d');
      for(let r=0;r<gridHeight;r++) for(let c=0;c<gridWidth;c++){
        ectx.fillStyle = grid[r][c] || '#FFFFFF';
        ectx.fillRect(c*CELL_SIZE, r*CELL_SIZE, CELL_SIZE, CELL_SIZE);
      }
      ectx.strokeStyle = GRID_COLOR; ectx.lineWidth = 0.5; ectx.beginPath();
      for(let i=0;i<=gridWidth;i++){ ectx.moveTo(i*CELL_SIZE,0); ectx.lineTo(i*CELL_SIZE,exp.height); }
      for(let j=0;j<=gridHeight;j++){ ectx.moveTo(0,j*CELL_SIZE); ectx.lineTo(exp.width,j*CELL_SIZE); }
      ectx.stroke();

      if(showNumbers){
        ectx.font = 'bold 11px sans-serif';
        ectx.textAlign = 'center';
        ectx.textBaseline = 'middle';
        for(let r=0;r<gridHeight;r++) for(let c=0;c<gridWidth;c++){
          const color = grid[r][c] || '#FFFFFF';
          const num = PALETTE_MAP[color];
          if(num){
            const x = c*CELL_SIZE + CELL_SIZE/2;
            const y = r*CELL_SIZE + CELL_SIZE/2;
            ectx.fillStyle = isLightColor(color) ? '#000' : '#fff';
            ectx.fillText(num, x, y);
          }
        }
      }

      exp.toBlob(b=>{
        const url = URL.createObjectURL(b);
        const a = document.createElement('a');
        a.href = url; a.download = 'Artkal拼豆图纸.png'; a.click();
        URL.revokeObjectURL(url);
      });
    });

    window.addEventListener('resize', fitToScreen);

    function initApp(){
      const w=80, h=Math.round(80*0.75);
      initGrid(w,h,null); gridWidth=w; gridHeight=h;
      updateCanvasSize(); buildPalette(); setTool('draw');
      history=[{grid:grid.map(r=>[...r]),w,h}]; historyIndex=0;
      render();
      fitToScreen();
    }
    initApp();
  })();
</script>
</body>
</html>
